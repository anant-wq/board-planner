{% extends "base.html" %}
{% block title %}Planner — Board Planner{% endblock %}
{% block content %}

<!-- Summary Cards -->
<div class="summary">
    <div class="card">
        <div class="label">Total Jobs</div>
        <div class="value" id="total-jobs">—</div>
    </div>
    <div class="card">
        <div class="label">Groups</div>
        <div class="value" id="total-groups">—</div>
    </div>
    <div class="card">
        <div class="label">Total Pending Qty</div>
        <div class="value" id="total-qty">—</div>
    </div>
    <div class="card">
        <div class="label">Selected</div>
        <div class="value" id="selected-count">0</div>
    </div>
</div>

<!-- View Toggle + Toolbar -->
<div class="toolbar">
    <div class="view-switcher">
        <button class="view-btn active" data-view="deckle" onclick="switchView('deckle')">Deckle View</button>
        <button class="view-btn" data-view="client" onclick="switchView('client')">Client View</button>
        <button class="view-btn" data-view="history" onclick="switchView('history')">90 Day History</button>
        <button class="view-btn" data-view="selection" onclick="switchView('selection')">Current Selection</button>
    </div>
    <input type="text" id="search" class="search-input" placeholder="Search BPRO, customer, item..." oninput="filterJobs()">
    <button class="btn btn-sm" onclick="refreshData()">Refresh</button>
    <button class="btn btn-del btn-sm" onclick="if(confirm('Clear all selections?')) clearSelection()">Reset All</button>
    <button class="btn btn-email btn-sm" id="email-flag-btn" disabled onclick="sendFlagEmail()">Send BPRO Request</button>
</div>

<!-- Breadcrumbs -->
<div class="breadcrumbs" id="breadcrumbs"></div>

<!-- Job Groups Container -->
<div id="groups-container"></div>

<!-- Sticky Bottom Plan Builder -->
<div class="plan-builder" id="plan-builder">
    <div class="plan-left">
        <strong><span id="plan-count">0</span> jobs selected</strong>
    </div>
    <div class="plan-right">
        <input type="date" id="plan-date" class="plan-date">
        <button class="btn btn-primary" onclick="exportCSV()">Export CSV</button>
        <button class="btn btn-sm" onclick="copyToClipboard()">Copy</button>
        <button class="btn btn-del btn-sm" onclick="clearSelection()">Clear</button>
    </div>
</div>

<!-- Hidden textarea for CSV -->
<textarea id="csv-output" style="display:none"></textarea>

<script>
// ---- State ----
const selectedJobs = new Set();
const selectionReasons = {};  // deckle -> "selected via CUSTOMER" reason
const flaggedHistory = new Set();  // board_item keys flagged for BPRO creation
let deckleData = {{ preloaded_deckle|safe }} || null;
let clientData = null;
let historyData = null;
let currentView = 'deckle';

// Set default date to today
document.getElementById('plan-date').valueAsDate = new Date();

// ---- Data Fetching ----
async function fetchDeckleJobs() {
    const res = await fetch('{{ url_for("api_deckle_jobs") }}');
    deckleData = await res.json();
    return deckleData;
}

async function fetchClientJobs() {
    const res = await fetch('{{ url_for("api_client_jobs") }}');
    clientData = await res.json();
    return clientData;
}

async function fetchHistory() {
    const res = await fetch('{{ url_for("api_history") }}');
    historyData = await res.json();
    return historyData;
}

async function refreshData() {
    await fetch('{{ url_for("api_refresh") }}');
    deckleData = null;
    clientData = null;
    historyData = null;
    await loadView(currentView);
}

// ---- View Switching ----
function switchView(view) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.view === view);
    });
    document.getElementById('search').value = '';
    loadView(view);
}

async function loadView(view) {
    const container = document.getElementById('groups-container');
    container.innerHTML = '<p class="loading">Loading...</p>';
    const bc = document.getElementById('breadcrumbs');

    if (view === 'selection') {
        await renderSelection(container);
        return;
    }

    if (view === 'history') {
        const data = historyData || await fetchHistory();
        document.getElementById('total-jobs').textContent = data.total;
        document.getElementById('total-groups').textContent = '—';
        const histTotalQty = (data.items || []).reduce((s, it) => s + (it.total_qty || 0), 0);
        document.getElementById('total-qty').textContent = formatQty(histTotalQty);
        renderHistory(container, data);
        bc.innerHTML = '';
        return;
    }

    let data;
    // Always ensure deckle data is loaded (needed for cross-view selection)
    if (!deckleData) await fetchDeckleJobs();

    if (view === 'deckle') {
        data = deckleData;
    } else {
        data = clientData || await fetchClientJobs();
    }

    document.getElementById('total-jobs').textContent = data.total_jobs;
    document.getElementById('total-groups').textContent = data.groups.length;
    const totalQty = data.groups.reduce((sum, g) => sum + (g.total_qty || 0), 0);
    document.getElementById('total-qty').textContent = formatQty(totalQty);
    renderGroups(data.groups, view);
}

// ---- Rendering ----
function renderGroups(groups, view) {
    const container = document.getElementById('groups-container');
    const search = document.getElementById('search').value.toLowerCase();

    let html = '';
    for (const group of groups) {
        const groupKey = view === 'deckle' ? group.deckle : group.client;
        const groupLabel = view === 'deckle'
            ? (group.deckle ? `Deckle ${group.deckle}"` : 'No Deckle Assigned')
            : group.client;

        // Filter jobs by search
        const jobs = search
            ? group.jobs.filter(j => matchesSearch(j, search))
            : group.jobs;

        if (jobs.length === 0) continue;

        // Check if all jobs in group are selected
        const allSelected = jobs.every(j => selectedJobs.has(j.bpro));

        const groupId = 'group-' + (groupKey || 'none').replace(/[^a-zA-Z0-9]/g, '_');
        html += `<details class="deckle-group" open id="${groupId}">
            <summary class="group-header">
                <label class="group-select" onclick="event.stopPropagation()">
                    <input type="checkbox" ${allSelected ? 'checked' : ''}
                        onchange="toggleGroup(this, '${groupKey}', '${view}')">
                </label>
                <span class="group-title">${groupLabel}</span>
                <span class="group-meta">${jobs.length} jobs &middot; ${formatQty(group.total_qty)} pcs</span>
            </summary>
            <div class="group-body">
                <table>
                    <thead><tr>
                        <th class="th-cb"></th>
                        ${view === 'deckle' ? `
                        <th>BPRO</th><th>Board Item</th><th>IPRO</th>
                        <th>Customer</th><th>Running Name</th><th>Qty</th><th>PRO Date</th><th></th>
                        ` : `
                        <th>BPRO</th><th>Board Item</th><th>Item Name</th>
                        <th>Running Name</th><th>Qty</th><th>Deckle</th><th>PRO Date</th><th>POC</th><th></th>
                        `}
                    </tr></thead>
                    <tbody>`;

        for (const job of jobs) {
            const checked = selectedJobs.has(job.bpro) ? 'checked' : '';
            if (view === 'deckle') {
                html += `<tr class="${checked ? 'row-selected' : ''}">
                    <td><input type="checkbox" ${checked} value="${job.bpro}" onchange="toggleJob(this)"></td>
                    <td class="mono">${job.bpro}</td>
                    <td class="td-item">${job.board_item}</td>
                    <td class="mono">${job.ipro}</td>
                    <td>${job.customer}</td>
                    <td>${job.running_name}</td>
                    <td class="td-qty">${job.qty}</td>
                    <td>${job.pro_date}</td>
                    <td><a href="/detail?deckle=${encodeURIComponent(group.deckle)}&ref_bpro=${encodeURIComponent(job.bpro)}" class="btn-detail" title="View deckle detail with paper analysis">Detail</a></td>
                </tr>`;
            } else {
                html += `<tr class="${checked ? 'row-selected' : ''}">
                    <td><input type="checkbox" ${checked} value="${job.bpro}" onchange="toggleJob(this)"></td>
                    <td class="mono">${job.bpro}</td>
                    <td class="td-item">${job.board_item}</td>
                    <td class="td-item">${job.item_name}</td>
                    <td>${job.running_name}</td>
                    <td class="td-qty">${job.qty}</td>
                    <td class="td-qty">${job.deckle}</td>
                    <td>${job.pro_date}</td>
                    <td>${job.poc_name || ''}</td>
                    <td><a href="/detail?deckle=${encodeURIComponent(job.deckle)}&ref_bpro=${encodeURIComponent(job.bpro)}" class="btn-detail" title="View deckle detail with paper analysis">Detail</a></td>
                </tr>`;
            }
        }

        html += `</tbody></table></div></details>`;
    }

    container.innerHTML = html || '<p class="empty-state">No jobs found.</p>';
    renderBreadcrumbs(groups, view);
}

function renderBreadcrumbs(groups, view) {
    const bc = document.getElementById('breadcrumbs');
    const search = document.getElementById('search').value.toLowerCase();
    let html = '';
    for (const group of groups) {
        const groupKey = view === 'deckle' ? group.deckle : group.client;
        const label = view === 'deckle'
            ? (group.deckle ? group.deckle + '"' : 'N/A')
            : group.client;
        const jobs = search
            ? group.jobs.filter(j => matchesSearch(j, search))
            : group.jobs;
        if (jobs.length === 0) continue;
        // Count selected in this group
        const selCount = jobs.filter(j => selectedJobs.has(j.bpro)).length;
        const selBadge = selCount > 0 ? `<span class="bc-sel">${selCount}</span>` : '';
        html += `<a class="bc-chip" href="#" onclick="scrollToGroup('${groupKey}', event)">${label} <span class="bc-count">${jobs.length}</span>${selBadge}</a>`;
    }
    bc.innerHTML = html;
}

function matchesSearch(job, query) {
    const fields = [
        job.bpro, job.board_item, job.item_name || '',
        job.customer || '', job.client || '',
        job.running_name || '', job.ipro || ''
    ];
    return fields.some(f => f.toLowerCase().includes(query));
}

// ---- Selection ----
function toggleJob(checkbox) {
    const bpro = checkbox.value;
    if (checkbox.checked) {
        selectedJobs.add(bpro);
        // In client view, also select all jobs at the same deckle
        if (currentView === 'client' && deckleData) {
            const jobDeckle = findJobDeckle(bpro);
            const customer = findJobCustomer(bpro);
            if (jobDeckle) {
                selectEntireDeckle(jobDeckle, true);
                selectionReasons[jobDeckle] = customer || 'Client View';
            }
        }
    } else {
        selectedJobs.delete(bpro);
    }
    checkbox.closest('tr').classList.toggle('row-selected', checkbox.checked);
    updatePlanCount();
    updateGroupCheckboxes();
    updateBreadcrumbSelection();
    // Re-render in client view to show newly selected rows
    if (currentView === 'client' && clientData) {
        renderGroups(clientData.groups, 'client');
    }
}

function findJobCustomer(bpro) {
    if (clientData) {
        for (const group of clientData.groups) {
            for (const job of group.jobs) {
                if (job.bpro === bpro) return group.client;
            }
        }
    }
    if (deckleData) {
        for (const group of deckleData.groups) {
            for (const job of group.jobs) {
                if (job.bpro === bpro) return job.customer || '';
            }
        }
    }
    return '';
}

function findJobDeckle(bpro) {
    if (!deckleData) return null;
    for (const group of deckleData.groups) {
        for (const job of group.jobs) {
            if (job.bpro === bpro) return group.deckle;
        }
    }
    // Also check client data for deckle field
    if (clientData) {
        for (const group of clientData.groups) {
            for (const job of group.jobs) {
                if (job.bpro === bpro) return job.deckle;
            }
        }
    }
    return null;
}

function selectEntireDeckle(deckle, checked) {
    if (!deckleData) return;
    for (const group of deckleData.groups) {
        if (group.deckle === deckle) {
            for (const job of group.jobs) {
                if (checked) selectedJobs.add(job.bpro);
                else selectedJobs.delete(job.bpro);
            }
            break;
        }
    }
}

function toggleGroup(checkbox, groupKey, view) {
    const data = view === 'deckle' ? deckleData : clientData;
    const group = data.groups.find(g =>
        view === 'deckle' ? g.deckle === groupKey : g.client === groupKey
    );
    if (!group) return;

    if (view === 'client' && checkbox.checked && deckleData) {
        // In client view, selecting a group should select all jobs at matching deckles
        const deckles = new Set(group.jobs.map(j => j.deckle).filter(Boolean));
        for (const d of deckles) {
            selectEntireDeckle(d, true);
            selectionReasons[d] = groupKey;  // groupKey is the client name
        }
    } else {
        for (const job of group.jobs) {
            if (checkbox.checked) {
                selectedJobs.add(job.bpro);
            } else {
                selectedJobs.delete(job.bpro);
            }
        }
    }
    updatePlanCount();
    // Re-render to update row checkboxes
    renderGroups(data.groups, view);
}

function clearSelection() {
    selectedJobs.clear();
    Object.keys(selectionReasons).forEach(k => delete selectionReasons[k]);
    updatePlanCount();
    const data = currentView === 'deckle' ? deckleData : clientData;
    if (data) renderGroups(data.groups, currentView);
}

function updatePlanCount() {
    const count = selectedJobs.size;
    document.getElementById('plan-count').textContent = count;
    document.getElementById('selected-count').textContent = count;
    document.getElementById('plan-builder').classList.toggle('empty', count === 0);
}

function updateGroupCheckboxes() {
    document.querySelectorAll('.group-select input[type="checkbox"]').forEach(cb => {
        const details = cb.closest('details');
        const rowCbs = details.querySelectorAll('tbody input[type="checkbox"]');
        cb.checked = rowCbs.length > 0 && Array.from(rowCbs).every(r => r.checked);
    });
}

// ---- Search/Filter ----
function filterJobs() {
    const data = currentView === 'deckle' ? deckleData : clientData;
    if (data) renderGroups(data.groups, currentView);
}

// ---- CSV Export ----
async function exportCSV() {
    if (selectedJobs.size === 0) {
        alert('No jobs selected');
        return;
    }

    const planDate = document.getElementById('plan-date').value;
    const res = await fetch('{{ url_for("api_export_plan") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({jobs: Array.from(selectedJobs), date: planDate})
    });
    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    // Download as file
    const blob = new Blob([data.csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `board-plan-${planDate || 'export'}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

async function copyToClipboard() {
    if (selectedJobs.size === 0) {
        alert('No jobs selected');
        return;
    }

    const planDate = document.getElementById('plan-date').value;
    const res = await fetch('{{ url_for("api_export_plan") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({jobs: Array.from(selectedJobs), date: planDate})
    });
    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    // Copy tab-separated (better for pasting into Google Sheets)
    const tsvLines = data.csv.split('\n').map(line => {
        // Simple CSV to TSV conversion for clipboard
        return line.replace(/,/g, '\t');
    });
    const tsv = tsvLines.join('\n');

    try {
        await navigator.clipboard.writeText(tsv);
        const btn = document.querySelector('.plan-right .btn-sm');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    } catch (e) {
        alert('Copy failed. Try Export CSV instead.');
    }
}

// ---- Breadcrumb selection update ----
function updateBreadcrumbSelection() {
    const data = currentView === 'deckle' ? deckleData : clientData;
    if (data) renderBreadcrumbs(data.groups, currentView);
}

// ---- Scroll to group ----
function scrollToGroup(groupKey, event) {
    event.preventDefault();
    const groupId = 'group-' + (groupKey || 'none').replace(/[^a-zA-Z0-9]/g, '_');
    const el = document.getElementById(groupId);
    if (el) {
        el.open = true;
        el.scrollIntoView({behavior: 'smooth', block: 'start'});
    }
}

// ---- History View ----
function getPriority(it) {
    const hasSO = (it.so_pending_qty || 0) > 0;
    const hasMP = (it.mp_pending_qty || 0) > 0;
    const hasDemand = hasSO || hasMP;
    const highRuns = it.runs >= 3;
    if (hasDemand && highRuns) return 3; // high
    if (hasDemand || highRuns) return 2; // medium
    return 1; // low
}

function getPriorityDot(p) {
    if (p === 3) return '<span class="dot dot-high" title="High: has pending SOs + 3+ runs"></span>';
    if (p === 2) return '<span class="dot dot-med" title="Medium: has pending SOs or 3+ runs"></span>';
    return '<span class="dot dot-low" title="Low"></span>';
}

function reRenderHistory() {
    if (historyData) renderHistory(document.getElementById('groups-container'), historyData);
}

function renderHistory(container, data) {
    const search = document.getElementById('search').value.toLowerCase();
    let items = data.items || [];

    // Apply search filter
    if (search) {
        items = items.filter(it =>
            (it.board_item + it.item_name + it.customer + it.running_name + it.deckle + it.paper)
                .toLowerCase().includes(search)
        );
    }

    // Apply history filters
    const filterEl = document.getElementById('hist-filter');
    const minRunsEl = document.getElementById('hist-min-runs');
    const sortEl = document.getElementById('hist-sort');
    const filter = filterEl ? filterEl.value : 'all';
    const minRuns = minRunsEl ? parseInt(minRunsEl.value) || 1 : 1;
    const sortBy = sortEl ? sortEl.value : 'priority';

    // Build pending board_items set for "No Active BPRO" filter
    const pendingBoards = new Set();
    if (deckleData) {
        for (const g of deckleData.groups) {
            for (const j of g.jobs) if (j.board_item) pendingBoards.add(j.board_item);
        }
    }

    // Filter
    items = items.filter(it => {
        if (it.runs < minRuns) return false;
        if (filter === 'with_demand' && !(it.so_pending_qty > 0 || it.mp_pending_qty > 0)) return false;
        if (filter === 'no_bpro' && pendingBoards.has(it.board_item)) return false;
        return true;
    });

    // Sort
    items.sort((a, b) => {
        if (sortBy === 'priority') return getPriority(b) - getPriority(a) || (b.so_pending_qty || 0) - (a.so_pending_qty || 0);
        if (sortBy === 'so_qty') return (b.so_pending_qty || 0) - (a.so_pending_qty || 0);
        if (sortBy === 'runs') return b.runs - a.runs;
        if (sortBy === 'last_run') return (b.last_run > a.last_run ? 1 : -1);
        return 0;
    });

    // Count summary
    const withSO = items.filter(it => (it.so_pending_qty || 0) > 0 || (it.mp_pending_qty || 0) > 0).length;
    const noBPRO = items.filter(it => !pendingBoards.has(it.board_item)).length;

    // Group by deckle
    const deckleGroups = {};
    for (const it of items) {
        if (!deckleGroups[it.deckle]) deckleGroups[it.deckle] = [];
        deckleGroups[it.deckle].push(it);
    }

    // Breadcrumbs
    const bc = document.getElementById('breadcrumbs');
    let bcHtml = '';
    const sortedDeckles = Object.keys(deckleGroups).sort((a, b) => (parseFloat(a) || 0) - (parseFloat(b) || 0));
    for (const d of sortedDeckles) {
        const soCount = deckleGroups[d].filter(it => (it.so_pending_qty || 0) > 0).length;
        const soBadge = soCount > 0 ? `<span class="bc-sel">${soCount}</span>` : '';
        bcHtml += `<a class="bc-chip" href="#" onclick="scrollToGroup('hist_${d}', event)">${d}" <span class="bc-count">${deckleGroups[d].length}</span>${soBadge}</a>`;
    }
    bc.innerHTML = bcHtml;

    // Filter bar
    let html = `<div class="hist-filters">
        <label>Filter: <select id="hist-filter" onchange="reRenderHistory()">
            <option value="all" ${filter==='all'?'selected':''}>All (${items.length})</option>
            <option value="with_demand" ${filter==='with_demand'?'selected':''}>With Pending Demand (${withSO})</option>
            <option value="no_bpro" ${filter==='no_bpro'?'selected':''}>No Active BPRO (${noBPRO})</option>
        </select></label>
        <label>Min Runs: <select id="hist-min-runs" onchange="reRenderHistory()">
            <option value="1" ${minRuns===1?'selected':''}>1+</option>
            <option value="2" ${minRuns===2?'selected':''}>2+</option>
            <option value="3" ${minRuns===3?'selected':''}>3+</option>
            <option value="5" ${minRuns===5?'selected':''}>5+</option>
        </select></label>
        <label>Sort: <select id="hist-sort" onchange="reRenderHistory()">
            <option value="priority" ${sortBy==='priority'?'selected':''}>Priority</option>
            <option value="so_qty" ${sortBy==='so_qty'?'selected':''}>SO Pending Qty</option>
            <option value="runs" ${sortBy==='runs'?'selected':''}>Runs</option>
            <option value="last_run" ${sortBy==='last_run'?'selected':''}>Last Run</option>
        </select></label>
        <span class="hist-summary">${items.length} boards &middot; ${withSO} with pending SOs</span>
    </div>`;

    // Render grouped tables
    for (const d of sortedDeckles) {
        const groupItems = deckleGroups[d];
        const groupSO = groupItems.filter(it => (it.so_pending_qty || 0) > 0).length;
        const groupId = 'group-hist_' + d.replace(/[^a-zA-Z0-9]/g, '_');
        html += `<details class="deckle-group" id="${groupId}">
            <summary class="group-header">
                <span class="group-title">Deckle ${d}"</span>
                <span class="group-meta">${groupItems.length} boards${groupSO > 0 ? ' &middot; ' + groupSO + ' with SOs' : ''}</span>
            </summary>
            <div class="group-body"><table>
                <thead><tr>
                    <th></th><th>Board Item</th>
                    <th>Customer</th><th>Running Name</th><th>1st Machine</th>
                    <th>Runs</th><th>Last Run</th>
                    <th>FG</th><th>MP Pending</th><th>SO Pending</th>
                </tr></thead><tbody>`;
        for (const it of groupItems) {
            const p = getPriority(it);
            const hasDemand = (it.so_pending_qty || 0) > 0 || (it.mp_pending_qty || 0) > 0;
            const demandClass = hasDemand ? ' row-has-so' : '';
            html += `<tr class="${demandClass}">
                <td>${getPriorityDot(p)}</td>
                <td class="td-item">${it.board_item}</td>
                <td>${it.customer}</td>
                <td>${it.running_name}</td>
                <td>${it.first_machine || '—'}</td>
                <td class="td-qty">${it.runs}</td>
                <td>${it.last_run}</td>
                <td class="td-qty">${(it.fg_qty||0) > 0 ? formatQty(it.fg_qty) : '—'}</td>
                <td class="td-qty ${(it.mp_pending_qty||0) > 0 ? 'so-highlight' : ''}">${(it.mp_pending_qty||0) > 0 ? formatQty(it.mp_pending_qty) : '—'}</td>
                <td class="td-qty ${(it.so_pending_qty||0) > 0 ? 'so-highlight' : ''}">${(it.so_pending_qty||0) > 0 ? formatQty(it.so_pending_qty) : '—'}</td>
            </tr>`;
        }
        html += '</tbody></table></div></details>';
    }

    document.getElementById('total-groups').textContent = sortedDeckles.length;
    container.innerHTML = html || '<p class="empty-state">No history found.</p>';
}

// ---- Current Selection View ----
async function renderSelection(container) {
    if (selectedJobs.size === 0) {
        document.getElementById('total-jobs').textContent = '0';
        document.getElementById('total-groups').textContent = '0';
        document.getElementById('total-qty').textContent = '0';
        document.getElementById('breadcrumbs').innerHTML = '';
        container.innerHTML = '<p class="empty-state">No jobs selected. Go to Deckle or Client view to select jobs.</p>';
        return;
    }

    if (!deckleData) {
        container.innerHTML = '<p class="loading">Load Deckle View first to see selection details.</p>';
        return;
    }

    // Ensure history is loaded
    if (!historyData) {
        container.innerHTML = '<p class="loading">Loading 90-day history...</p>';
        await fetchHistory();
    }

    // Build set of ALL pending board items (across all deckles)
    // Match by board_item, not BPRO — each production run gets a new BPRO number
    const allPendingBoardItems = new Set();
    for (const group of deckleData.groups) {
        for (const job of group.jobs) {
            if (job.board_item) allPendingBoardItems.add(job.board_item);
        }
    }

    // Gather selected job details
    const selJobs = [];
    for (const group of deckleData.groups) {
        for (const job of group.jobs) {
            if (selectedJobs.has(job.bpro)) {
                selJobs.push({...job, deckle: group.deckle});
            }
        }
    }

    // Group by deckle
    const grouped = {};
    for (const j of selJobs) {
        const d = j.deckle || 'N/A';
        if (!grouped[d]) grouped[d] = [];
        grouped[d].push(j);
    }

    const sortedDeckles = Object.keys(grouped).sort((a, b) => (parseFloat(a) || 0) - (parseFloat(b) || 0));

    // Group history by deckle for quick lookup
    const histByDeckle = {};
    if (historyData && historyData.items) {
        for (const it of historyData.items) {
            if (!histByDeckle[it.deckle]) histByDeckle[it.deckle] = [];
            histByDeckle[it.deckle].push(it);
        }
    }

    // Breadcrumbs with checkboxes and reasons
    const bc = document.getElementById('breadcrumbs');
    let bcHtml = '';
    for (const d of sortedDeckles) {
        const label = d === 'N/A' ? 'N/A' : d + '"';
        const reason = selectionReasons[d] ? ` (${selectionReasons[d]})` : '';
        bcHtml += `<label class="bc-chip bc-check" onclick="event.stopPropagation()">
            <input type="checkbox" checked onchange="toggleSelBreadcrumb(this, '${d}')">
            ${label}${reason} <span class="bc-count">${grouped[d].length}</span>
        </label>`;
    }
    bc.innerHTML = bcHtml;

    let html = '';
    for (const d of sortedDeckles) {
        const jobs = grouped[d];
        let groupQty = 0;
        for (const j of jobs) { try { groupQty += parseInt(j.qty) || 0; } catch(e) {} }

        // Extract paper configs from selected jobs in this deckle
        const paperConfigs = new Set();
        for (const j of jobs) {
            const p = extractPaperJS(j.board_item);
            if (p) paperConfigs.add(p);
        }

        // Find 90-day history items for this deckle that are NOT pending
        const histItems = histByDeckle[d] || [];
        const missingItems = histItems.filter(it => it.board_item && !allPendingBoardItems.has(it.board_item));

        // Split missing into same-paper and different-paper
        const missingSame = [];
        const missingDiff = [];
        const seenBoards = new Set();
        for (const it of missingItems) {
            if (seenBoards.has(it.board_item)) continue;
            seenBoards.add(it.board_item);
            if (it.paper && paperConfigs.has(it.paper)) {
                missingSame.push(it);
            } else {
                missingDiff.push(it);
            }
        }

        const groupId = 'group-sel_' + d.replace(/[^a-zA-Z0-9]/g, '_');
        const reason = selectionReasons[d] ? ` (selected via ${selectionReasons[d]})` : '';

        html += `<details class="deckle-group" open id="${groupId}">
            <summary class="group-header">
                <span class="group-title">${d === 'N/A' ? 'No Deckle' : 'Deckle ' + d + '"'}${reason}</span>
                <span class="group-meta">${jobs.length} pending &middot; ${formatQty(groupQty)} pcs</span>
                <button class="btn btn-del btn-xs" onclick="event.stopPropagation(); removeSelGroup('${d}')">Remove</button>
            </summary>
            <div class="group-body">

            <h4 class="sel-section-title">Pending BPROs (Selected)</h4>
            <table>
                <thead><tr>
                    <th>BPRO</th><th>Board Item</th><th>Paper Config</th><th>IPRO</th>
                    <th>Customer</th><th>Running Name</th><th>Qty</th><th>PRO Date</th>
                    <th></th>
                </tr></thead><tbody>`;
        for (const j of jobs) {
            const paper = extractPaperJS(j.board_item);
            html += `<tr>
                <td class="mono">${j.bpro}</td>
                <td class="td-item">${j.board_item}</td>
                <td class="td-paper"><code>${paper}</code></td>
                <td class="mono">${j.ipro}</td>
                <td>${j.customer}</td>
                <td>${j.running_name}</td>
                <td class="td-qty">${j.qty}</td>
                <td>${j.pro_date}</td>
                <td><button class="btn btn-del btn-xs" onclick="removeSelJob('${j.bpro}')">x</button></td>
            </tr>`;
        }
        html += '</tbody></table>';

        // Section: Missing Opportunities — Same Paper (collapsible)
        html += `<details class="hist-section" open>
            <summary class="sel-section-title same-paper-title">90-Day History — Same Paper (${missingSame.length})</summary>`;
        if (missingSame.length > 0) {
            html += renderMissingTable(missingSame);
        } else {
            html += '<p class="empty-hint">No matching boards with same paper found in 90-day history.</p>';
        }
        html += '</details>';

        // Section: Missing Opportunities — Different Paper (collapsible)
        html += `<details class="hist-section">
            <summary class="sel-section-title diff-paper-title">90-Day History — Different Paper (${missingDiff.length})</summary>`;
        if (missingDiff.length > 0) {
            html += renderMissingTable(missingDiff);
        } else {
            html += '<p class="empty-hint">No boards with different paper found in 90-day history.</p>';
        }
        html += '</details>';

        html += '</div></details>';
    }

    const selTotalQty = selJobs.reduce((s, j) => { try { return s + (parseInt(j.qty) || 0); } catch(e) { return s; } }, 0);
    document.getElementById('total-jobs').textContent = selJobs.length;
    document.getElementById('total-groups').textContent = sortedDeckles.length;
    document.getElementById('total-qty').textContent = formatQty(selTotalQty);
    container.innerHTML = html;
}

function extractPaperJS(boardItem) {
    if (!boardItem) return '';
    const parts = boardItem.split('-');
    for (const part of parts) {
        if (part.includes('_') && /\d/.test(part)) {
            return part.toLowerCase();
        }
    }
    return '';
}

function renderMissingTable(items) {
    let html = `<table class="missing-table">
        <thead><tr>
            <th class="th-cb"></th>
            <th></th><th>Board Item</th>
            <th>Customer</th><th>Running Name</th><th>1st Machine</th>
            <th>Runs</th><th>Last Run</th>
            <th>FG</th><th>MP Pending</th><th>SO Pending</th>
        </tr></thead><tbody>`;
    for (const it of items) {
        const key = it.board_item + '|' + it.customer;
        const checked = flaggedHistory.has(key) ? 'checked' : '';
        const p = getPriority(it);
        const hasDemand = (it.so_pending_qty || 0) > 0 || (it.mp_pending_qty || 0) > 0;
        const demandClass = hasDemand ? ' row-has-so' : '';
        html += `<tr class="${checked ? 'row-flagged' : ''}${demandClass}">
            <td><input type="checkbox" ${checked} data-key="${escHtml(key)}" data-board="${escHtml(it.board_item)}" data-customer="${escHtml(it.customer)}" data-running="${escHtml(it.running_name)}" data-paper="${escHtml(it.paper)}" data-runs="${it.runs}" data-lastrun="${it.last_run}" onchange="toggleFlag(this)"></td>
            <td>${getPriorityDot(p)}</td>
            <td class="td-item">${it.board_item}</td>
            <td>${it.customer}</td>
            <td>${it.running_name}</td>
            <td>${it.first_machine || '—'}</td>
            <td class="td-qty">${it.runs}</td>
            <td>${it.last_run}</td>
            <td class="td-qty">${(it.fg_qty||0) > 0 ? formatQty(it.fg_qty) : '—'}</td>
            <td class="td-qty ${(it.mp_pending_qty||0) > 0 ? 'so-highlight' : ''}">${(it.mp_pending_qty||0) > 0 ? formatQty(it.mp_pending_qty) : '—'}</td>
            <td class="td-qty ${(it.so_pending_qty||0) > 0 ? 'so-highlight' : ''}">${(it.so_pending_qty||0) > 0 ? formatQty(it.so_pending_qty) : '—'}</td>
        </tr>`;
    }
    html += '</tbody></table>';
    return html;
}

function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function toggleFlag(checkbox) {
    const key = checkbox.dataset.key;
    if (checkbox.checked) {
        flaggedHistory.add(key);
    } else {
        flaggedHistory.delete(key);
    }
    checkbox.closest('tr').classList.toggle('row-flagged', checkbox.checked);
    updateFlagCount();
}

function updateFlagCount() {
    const btn = document.getElementById('email-flag-btn');
    if (btn) {
        btn.textContent = flaggedHistory.size > 0
            ? `Send BPRO Request (${flaggedHistory.size})`
            : 'Send BPRO Request';
        btn.disabled = flaggedHistory.size === 0;
    }
}

async function sendFlagEmail() {
    if (flaggedHistory.size === 0) {
        alert('No items flagged. Tick items in the 90-day history sections first.');
        return;
    }

    if (!confirm(`Send BPRO request for ${flaggedHistory.size} board(s) to WhatsApp groups?`)) return;

    // Collect flagged item details from checkboxes
    const items = [];
    document.querySelectorAll('.missing-table input[type="checkbox"]:checked').forEach(cb => {
        items.push({
            board_item: cb.dataset.board,
            customer: cb.dataset.customer,
            running_name: cb.dataset.running,
            paper: cb.dataset.paper,
            runs: cb.dataset.runs,
            last_run: cb.dataset.lastrun,
        });
    });

    // Group by customer
    const byCustomer = {};
    for (const it of items) {
        if (!byCustomer[it.customer]) byCustomer[it.customer] = [];
        byCustomer[it.customer].push(it);
    }

    // Build WhatsApp message
    const planDate = document.getElementById('plan-date').value || new Date().toLocaleDateString('en-IN');
    let msg = `📋 *BPRO Request — ${planDate}*\n\n`;
    msg += `${items.length} board(s) identified from 90-day history needing new BPROs.\n`;
    msg += `These have been historically produced but have no active production orders.\n\n`;

    for (const [customer, custItems] of Object.entries(byCustomer)) {
        msg += `*--- ${customer} ---*\n`;
        for (const it of custItems) {
            msg += `Board: ${it.board_item}\n`;
            msg += `Paper: ${it.paper} | Runs: ${it.runs} | Last: ${it.last_run}\n`;
            if (it.running_name) msg += `Running: ${it.running_name}\n`;
            msg += '\n';
        }
    }

    msg += `_Please review and create BPROs as needed._`;

    // Send via server API
    const btn = document.getElementById('email-flag-btn');
    btn.textContent = 'Sending...';
    btn.disabled = true;

    try {
        const res = await fetch('{{ url_for("api_send_bpro_request") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        const data = await res.json();

        if (data.ok) {
            alert(data.message);
            flaggedHistory.clear();
            if (currentView === 'selection') {
                await renderSelection(document.getElementById('groups-container'));
            }
        } else {
            alert('Failed to send: ' + (data.error || 'Unknown error'));
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
    updateFlagCount();
}

async function removeSelJob(bpro) {
    selectedJobs.delete(bpro);
    updatePlanCount();
    await renderSelection(document.getElementById('groups-container'));
}

function toggleSelBreadcrumb(checkbox, deckle) {
    if (!checkbox.checked) {
        removeSelGroup(deckle);
    }
}

async function removeSelGroup(deckle) {
    if (!deckleData) return;
    for (const group of deckleData.groups) {
        if (group.deckle === deckle) {
            for (const job of group.jobs) selectedJobs.delete(job.bpro);
            break;
        }
    }
    delete selectionReasons[deckle];
    updatePlanCount();
    await renderSelection(document.getElementById('groups-container'));
}

// ---- Helpers ----
function formatQty(n) {
    return Number(n).toLocaleString('en-IN');
}

// ---- Init ----
loadView('deckle');
</script>
{% endblock %}
